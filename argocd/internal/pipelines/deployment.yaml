apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipelines
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipelines
  template:
    metadata:
      labels:
        app: pipelines
    spec:
      containers:
        - name: pipelines
          image: ghcr.io/open-webui/pipelines:main
          ports:
            - name: http
              containerPort: 9099
          env:
            - name: OLLAMA_URL
              value: http://ollama.ai.svc.cluster.local:11434
            - name: QDRANT_URL
              value: http://qdrant.ai.svc.cluster.local:6333
          volumeMounts:
            - name: data
              mountPath: /app/pipelines
          readinessProbe:
            httpGet:
              path: /
              port: 9099
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pipelines
