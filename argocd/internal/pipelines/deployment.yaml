apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipelines
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipelines
  template:
    metadata:
      labels:
        app: pipelines
    spec:
      containers:
        - name: pipelines
          image: ghcr.io/open-webui/pipelines:main
          ports:
            - name: http
              containerPort: 9099
          env:
            - name: OLLAMA_URL
              value: http://ollama.ai.svc.cluster.local:11434
            - name: QDRANT_URL
              value: http://qdrant.ai.svc.cluster.local:6333
            - name: LANGFUSE_HOST
              value: http://langfuse-web.ai.svc.cluster.local:3000
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-pipeline-credentials
                  key: public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-pipeline-credentials
                  key: secret-key
          volumeMounts:
            - name: pipeline-code
              mountPath: /app/pipelines/rag_pipeline.py
              subPath: rag_pipeline.py
          readinessProbe:
            httpGet:
              path: /
              port: 9099
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: pipeline-code
          configMap:
            name: rag-pipeline
