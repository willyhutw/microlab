apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-device-plugin
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: 'git@github.com:willyhutw/microlab.git'
    targetRevision: HEAD
    path: argocd/internal/nvidia-device-plugin
    directory:
      recurse: true
  destination:
    name: micro
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
