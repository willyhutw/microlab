apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipelines
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: 'git@github.com:willyhutw/microlab.git'
    targetRevision: HEAD
    path: argocd/internal/pipelines
    kustomize:
      buildOptions: "--load-restrictor LoadRestrictionsNone"
  destination:
    name: micro
    namespace: ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
