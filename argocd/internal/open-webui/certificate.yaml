apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: chat-willyhu-tw-tls
  namespace: istio-system
spec:
  secretName: chat-willyhu-tw-tls
  duration: 2160h
  renewBefore: 360h
  dnsNames:
    - chat.willyhu.tw
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-prod
  usages:
    - digital signature
    - key encipherment
