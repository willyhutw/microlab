langfuse:
  salt:
    secretKeyRef:
      name: langfuse-secrets
      key: salt
  encryptionKey:
    secretKeyRef:
      name: langfuse-secrets
      key: encryption-key
  nextauth:
    url: "https://langfuse.willyhu.tw"
    secret:
      secretKeyRef:
        name: langfuse-secrets
        key: nextauth-secret
  features:
    telemetryEnabled: false

# External PostgreSQL in data namespace
postgresql:
  deploy: false
  host: postgresql.data.svc.cluster.local
  port: 5432
  auth:
    username: langfuse
    database: langfuse
    existingSecret: langfuse-secrets
    secretKeys:
      userPasswordKey: langfuse-db-password

# Redis/Valkey — bundled, no persistence, internal only
redis:
  deploy: true
  auth:
    password: "langfuse-redis"
  resourcesPreset: nano
  primary:
    persistence:
      enabled: false

# ClickHouse — single node, no cluster, no ZooKeeper, no persistence
clickhouse:
  deploy: true
  replicaCount: 1
  clusterEnabled: false
  resourcesPreset: micro
  auth:
    password: "langfuse"
  persistence:
    enabled: false
  zookeeper:
    enabled: false

# MinIO — bundled, no persistence
s3:
  deploy: true
  auth:
    rootUser: minio
    rootPassword: "langfuse"
  resourcesPreset: nano
  persistence:
    enabled: false

# Pi5-friendly resource limits
web:
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

worker:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi

ingress:
  enabled: false
